#version: '3'

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}

    #    container_name: jcm-php
    volumes:
      - "./:/var/www/html"
    environment:
      PHP_IDE_CONFIG: "serverName=jcm-server"

  nginx:
    image: nginx:latest
    #    container_name: jcm-nginx
    ports:
      - "3200:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./public:/var/www/html/public
  #    depends_on:
  #      - php

  db:
    image: mysql:8.0
    #    container_name: jcm-db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: jcm_server
      MYSQL_USER: jcm_user
      MYSQL_PASSWORD: jcm_password
    ports:
      - "3306"
    volumes:
      - db_data:/var/lib/mysql


  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    #    container_name: jcm-phpmyadmin
    environment:
      PMA_HOST: db
      PMA_USER: jcm_user
      PMA_PASSWORD: jcm_password
      PMA_PORT: 3306
    ports:
      - "80"
    depends_on:
      - db

  mailhog:
    image: mailhog/mailhog
    #    container_name: jcm-mailhog
    ports:
      - "8025:8025"


###> doctrine/doctrine-bundle ###
  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      # You should definitely change the password in production
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    volumes:
      - database_data:/var/lib/postgresql/data:rw
      # You may use a bind-mounted host directory instead, so that it is harder to accidentally remove the volume and lose all your data!
      # - ./docker/db/data:/var/lib/postgresql/data:rw
###< doctrine/doctrine-bundle ###

volumes:
  db_data:
###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
