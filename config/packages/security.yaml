security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: admin_login
                check_path: admin_login_check
                enable_csrf: true
                default_target_path: admin_doctors_index
            logout:
                path: /admin/logout
                target: home

    access_control:
        - { path: ^/admin/login$, roles: PUBLIC_ACCESS }
        - { path: ^/admin/login_check, roles: PUBLIC_ACCESS }
        - { path: ^/api/registered-doctors$, roles: PUBLIC_ACCESS, methods: [POST] }
        - { path: ^/registered-doctors$, roles: ROLE_ADMIN, methods: [GET] }
        - { path: ^/admin, roles: ROLE_ADMIN }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
